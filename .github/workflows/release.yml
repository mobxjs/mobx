name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  id-token: write
  pull-requests: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          # This makes Actions fetch all Git history so that Changesets can generate changelogs with the correct commits
          fetch-depth: 0

      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          auth-type: oidc

      - name: Update npm
        run: npm install -g npm@11.13.0

      - name: Install Dependencies
        run: yarn

      - name: Build packages
        run: yarn lerna run build

      - name: Debug npm auth and registry
        run: |
          echo "--- npm version ---"
          npm --version
          echo "--- npm config ---"
          npm config list
          echo "--- npm registry ---"
          npm config get registry
          echo "--- OIDC token check ---"
          if [ -n "$ACTIONS_ID_TOKEN_REQUEST_TOKEN" ]; then
            echo "OIDC token request token is set"
          else
            echo "OIDC token request token is NOT set"
          fi
          echo "--- npm whoami ---"
          npm whoami || echo "npm whoami failed - this is expected if OIDC is not configured"

      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          # This expects you to have a script called release which does a build for your packages and calls changeset publish
          publish: npm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # We must explicitly clear `NODE_AUTH_TOKEN` here. `actions/setup-node`
          # auto-writes `.npmrc` with `//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}`
          # whenever `registry-url` is set, AND it exports the literal sentinel
          # `NODE_AUTH_TOKEN=XXXXX-XXXXX-XXXXX-XXXXX` as a default. Without this
          # override, npm CLI 11.x prefers the (bogus) token over OIDC, fails auth,
          # and surfaces a misleading `404 Not Found - PUT` from the registry —
          # see actions/setup-node#1445 and npm/cli#9088. Setting NODE_AUTH_TOKEN
          # to an empty string forces npm to fall through to the OIDC trusted-
          # publishing flow (provenance is still signed via Sigstore automatically).
          NODE_AUTH_TOKEN: ''
